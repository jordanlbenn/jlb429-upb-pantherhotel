<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Booking Confirmed - Panter Hotel</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">

  <style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        height: 100vh;

        background: linear-gradient(135deg, #0a0f2c, #0e0279);
    }

    .overlay {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .card-box {
        width: 450px;
        padding: 35px;
        border-radius: 16px;
        background: rgba(255,255,255,0.12);
        backdrop-filter: blur(12px);

        color: white;
        text-align: center;

        box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        border: 1px solid rgba(255,255,255,0.15);
    }

    h2 {
        color: #7CFC90;
        margin-bottom: 15px;
        font-size: 26px;
    }

    p {
        color: #eaeaea;
    }

    .info {
        text-align: left;
        margin-top: 20px;
        font-size: 15px;
        line-height: 1.8;
        background: rgba(0,0,0,0.15);
        padding: 15px;
        border-radius: 10px;
    }

    .label {
        font-weight: bold;
        color: #cfd8ff;
    }

    .btn {
        display: inline-block;
        margin-top: 18px;
        padding: 10px 18px;
        border-radius: 8px;
        text-decoration: none;
        color: rgb(255, 255, 255);
        background: #00113f;
        transition: 0.3s;
        margin: 5px;
    }

    .btn:hover {
        background: #222630;
        transform: scale(1.05);
    }

    .secondary {
        background: #151516;
    }

    .secondary:hover {
        background: #555;
    }
  </style>
</head>

<body>

<div class="overlay">

    <div class="card-box">

        <h2>🎉 Reservation Confirmed!</h2>

        <p>
            Thank you, <strong>{{ name }}</strong>.<br>
            Your booking has been successfully completed.
        </p>

        <div class="info">

            <div><span class="label">Room Type:</span> {{ room_type }}</div>
            <div><span class="label">Check-In:</span> {{ checkin }}</div>
            <div><span class="label">Check-Out:</span> {{ checkout }}</div>

        </div>

        <a href="/" class="btn">Return Home</a>
        <a href="/reserve" class="btn secondary">Book Another</a>

    </div>

</div>

</body>
</html>
