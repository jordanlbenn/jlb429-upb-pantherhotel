<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manager Dashboard - Panter Hotel</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0a0f2c, #0e0279);
            min-height: 100vh;
        }

        .overlay {
            padding: 50px 20px;
            display: flex;
            justify-content: center;
        }

        .card-box {
            width: 95%;
            max-width: 1000px;

            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(12px);

            border-radius: 16px;
            padding: 30px;

            color: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #7CFC90;
        }

        table {
            background: rgba(255,255,255,0.1);
            color: white;
            border-radius: 10px;
            overflow: hidden;
        }

        thead {
            background: rgba(0,0,0,0.3);
        }

        th, td {
            padding: 12px;
            text-align: center;
        }

        tr:hover {
            background: rgba(255,255,255,0.08);
        }

        .btn-home {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 18px;
            border-radius: 8px;
            background: #1a237e;
            color: white;
            text-decoration: none;
            transition: 0.3s;
        }

        .btn-home:hover {
            background: #283593;
            transform: scale(1.05);
        }

        .top-note {
            text-align: center;
            font-size: 14px;
            color: #ccc;
            margin-bottom: 15px;
        }
    </style>
</head>

<body>

<div class="overlay">

    <div class="card-box">

        <h2>📊 Manager Dashboard</h2>

        <div class="top-note">
            All active reservations for Panter Hotel system
        </div>

        <table class="table table-bordered table-dark table-hover mt-3">

            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Room Type</th>
                    <th>Check-In</th>
                    <th>Check-Out</th>
                </tr>
            </thead>

            <tbody>
                {% for r in reservations %}
                <tr>
                    <td>{{ r[0] }}</td>
                    <td>{{ r[1] }}</td>
                    <td>{{ r[4] }}</td>
                    <td>{{ r[2] }}</td>
                    <td>{{ r[3] }}</td>
                </tr>
                {% endfor %}
            </tbody>

        </table>

        <div class="text-center">
            <a href="/" class="btn-home">← Back to Home</a>
        </div>

    </div>

</div>

</body>
</html>
