<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Panter Hotel</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            height: 100vh;
            background: url("https://www.upb.pitt.edu/sites/default/files/images-inline/2023-09/news_US-College-ranking_standard.jpg") no-repeat center center/cover;
        }

        .overlay {
            background: rgba(0,0,0,0.55);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card-box {
            text-align: center;
            padding: 50px;
            border-radius: 16px;

            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(10px);

            color: white;
            width: 80%;
            max-width: 600px;

            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .title {
            font-size: 52px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .subtitle {
            font-size: 18px;
            margin-top: 10px;
            margin-bottom: 30px;
            color: #eaeaea;
        }

        .btn-custom {
            display: inline-block;
            padding: 12px 22px;
            margin: 10px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 18px;
            transition: 0.3s;
        }

        .btn-primary-custom {
            background: #0e0279;
            color: white;
        }

        .btn-primary-custom:hover {
            background: #1a0db3;
            transform: scale(1.05);
            color: white;
        }

        .btn-dark-custom {
            background: #222;
            color: white;
        }

        .btn-dark-custom:hover {
            background: #444;
            transform: scale(1.05);
            color: white;
        }

        .tagline {
            margin-top: 20px;
            font-size: 14px;
            color: #ccc;
        }
    </style>
</head>

<body>

<div class="overlay">

    <div class="card-box">

        <div class="title">Panter Hotel</div>

        <div class="subtitle">
            Luxury stays. Modern comfort. Affordable prices.
        </div>

        <a href="/reserve" class="btn-custom btn-primary-custom">
            Make a Reservation
        </a>

        <a href="/room-list" class="btn-custom btn-dark-custom">
            Manager Dashboard
        </a>

        <div class="tagline">
            Experience premium hospitality in every stay!
        </div>

    </div>

</div>

</body>
</html>
